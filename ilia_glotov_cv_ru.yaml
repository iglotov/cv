          - Внедрил Wazuh (~100 agents) и участвовал в обеспечении ISO/IEC 27001:2022 compliance
          - Существенно снизил alert noise за счет настройки monitoring и alerting systems
          - Поддерживал incident response, участвовал в on-call rotations и в подготовке postmortems
          - Поддерживал VPN-доступ в условиях network restrictions (multi-endpoint, failover)
          - Развернул internal mail server для уведомлений с SPF/DKIM/DMARC и Vault-based credentials
          - Управлял AWS infrastructure с помощью Terraform и Ansible (EKS, EC2, IAM, networking)
          - Участвовал в англоязычных сессиях с certification authorities по вопросам game compliance
            для выхода на новые рынки
