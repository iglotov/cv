          AWS-based Kubernetes инфраструктуре, включая подготовку к сертификации ISO/IEC 27001:2022.
        highlights:
          - Спроектировал и внедрил автоматическое масштабирование для AWS EKS (KEDA + Karpenter, spot instances), сократив
            затраты dev-кластера примерно на 25%
          - Применил load-based стратегию масштабирования в production с использованием custom metrics
          - Разработал tooling для dynamic development environments, включая provisioning scripts и
            database templating
          - Построил HA observability platform (Grafana + VictoriaMetrics + VictoriaLogs, 3 AZs, multi-tenant),
