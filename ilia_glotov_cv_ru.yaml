  sections:
    summary:
      - Senior DevOps / Site Reliability Engineer с практическим опытом по всему жизненному циклу инфраструктуры -
        от небольших команд с полной ответственностью за платформу до крупных сред (~1500+ серверов).
      - Сильная экспертиза в Infrastructure as Code, Kubernetes и AWS с фокусом на построении масштабируемых,
        надежных и экономически эффективных систем. Есть опыт в observability, управлении инцидентами и безопасностью,
        включая участие в обеспечении соответствия ISO/IEC 27001:2022.
      - Подтвержденный опыт оптимизации инфраструктурных затрат, повышения качества мониторинга и поддержки
        высоконагруженных production-систем в динамичных и ограниченных средах.
    skills:
      - label: Облака и инфраструктура
        details: AWS (EKS, EC2, S3, Route53, Load Balancers), bare-metal infrastructure (multi-provider
          environments), Cloudflare, Proxmox VE, VMWare vSphere/ESXi
      - label: Контейнеризация и оркестрация
        details: Kubernetes (EKS, RKE, OpenShift, Talos), KEDA, Karpenter, Docker
      - label: Infrastructure as Code и управление конфигурацией
        details: Ansible, Saltstack, Terraform
      - label: CI/CD и автоматизация
        details: GitLab CI/CD, Bash, ArgoCD, Jenkins
      - label: Observability и мониторинг
        details: Grafana, Prometheus, Alertmanager, VictoriaMetrics, VictoriaLogs, ELK stack, Zabbix, Datadog
      - label: Базы данных и брокеры сообщений
        details: PostgreSQL, MySQL, MariaDB, Clickhouse, MongoDB, Redis, Kafka
      - label: Безопасность и сети
        details: Wazuh, Vault, network isolation, firewalls, mail security (SPF/DKIM/DMARC, etc),
          VPNs (OpenVPN, WireGuard, multi-endpoint setups, traffic routing under restrictions)
      - label: Другие инструменты
        details: Nginx, HAProxy, MinIO, Harbor, PowerDNS, Rancher, Apache Airflow (deployment & support)
