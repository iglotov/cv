  design:
    theme: harvard
    page:
      size: a4
      show_footer: true
      show_top_note: true
    typography:
      alignment: justified
      date_and_location_column_alignment: right
    links:
      underline: false
      show_external_link_icon: true
    header:
      connections:
        phone_number_format: international
        hyperlink: true
        show_icons: true
        display_urls_instead_of_usernames: true
        separator: ''
    sections:
      allow_page_break: true
#      show_time_spans_in:
#        - experience
    entries:
      allow_page_break: true
      short_second_row: false
    templates:
      footer: '*NAME -- Page PAGE_NUMBER of TOTAL_PAGES*'
#      time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
